name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    env:
      # Non-secret placeholders so `next build` and unit tests can run without
      # a real project. Real secrets are never needed in PR builds.
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_DEMO_ACCOUNTS: "false"
      # Non-connecting placeholder so any build-time module load that reads
      # DATABASE_URL does not throw. No real DB is contacted during build.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      AUTH_SECRET: ci-placeholder-secret-not-used-at-runtime
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # Use `npm install` (not `npm ci`) because no package-lock.json is
        # committed yet. Once a lockfile is added, switch back to `npm ci`
        # and re-enable `cache: npm` above for faster, reproducible installs.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  db:
    name: Supabase migrations (clean DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase & apply migrations + seed
        run: supabase start
      - name: Verify RLS enabled on all public tables
        # supabase start exposes Postgres on localhost:54322 (password "postgres").
        # `supabase db execute` is not a valid CLI command, so use psql directly.
        run: |
          psql "postgresql://postgres:postgres@localhost:54322/postgres" -v ON_ERROR_STOP=1 <<'SQL'
          do $$
          declare bad text;
          begin
            select string_agg(c.relname, ', ') into bad
            from pg_class c join pg_namespace n on n.oid = c.relnamespace
            where n.nspname = 'public' and c.relkind = 'r' and c.relrowsecurity = false;
            if bad is not null then
              raise exception 'Tables without RLS: %', bad;
            end if;
          end $$;
          SQL

  docker:
    name: Docker build & publish
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
